name: Build MemVibe DMG

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build and Package macOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build MemVibe App (Unsigned)
        run: |
          # Builds the app directly to a local build folder, skipping code signing 
          # since GitHub Actions doesn't have your local Apple Developer credentials.
          xcodebuild clean build \
            -project MemVibe.xcodeproj \
            -scheme MemVibe \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create DMG Installer
        run: |
          # Create an attractive DMG using create-dmg, which automatically 
          # handles the volume icon and Applications shortcut
          npx -y create-dmg --no-sign "build/Build/Products/Release/MemVibe.app" ./
          
          # Rename the generated DMG (which may include version info)
          mv *.dmg MemVibe.dmg

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MemVibe-Installer
          path: MemVibe.dmg
          retention-days: 7
