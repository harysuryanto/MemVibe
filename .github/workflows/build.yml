name: Build MemVibe DMG

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build and Package macOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build MemVibe App (Unsigned)
        run: |
          # Builds the app directly to a local build folder, skipping code signing 
          # since GitHub Actions doesn't have your local Apple Developer credentials.
          xcodebuild clean build \
            -project MemVibe.xcodeproj \
            -scheme MemVibe \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Generate .icns from source icon
        run: |
          # The new Xcode .icon format doesn't produce .icns files,
          # so we convert the source PNG to .icns for the DMG volume icon.
          SRC_PNG="MemVibe/MemVibeIcon.icon/Assets/AppIcon.png"
          ICONSET="MemVibe.iconset"
          mkdir -p "$ICONSET"

          # Generate all required icon sizes using sips
          for size in 16 32 128 256 512; do
            sips -z $size $size "$SRC_PNG" --out "$ICONSET/icon_${size}x${size}.png" > /dev/null
            double=$((size * 2))
            sips -z $double $double "$SRC_PNG" --out "$ICONSET/icon_${size}x${size}@2x.png" > /dev/null
          done

          # Convert iconset to icns
          iconutil -c icns "$ICONSET" -o MemVibe.icns
          echo "Generated MemVibe.icns successfully"

      - name: Create DMG Installer
        run: |
          APP_PATH="build/Build/Products/Release/MemVibe.app"

          # Copy .icns into the app bundle so Finder shows the icon
          cp MemVibe.icns "$APP_PATH/Contents/Resources/MemVibeIcon.icns"

          # Stage the app into a folder (create-dmg expects a source folder)
          mkdir -p dmg_staging
          cp -R "$APP_PATH" dmg_staging/

          create-dmg \
            --volname "MemVibe" \
            --volicon "MemVibe.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "MemVibe.app" 175 190 \
            --hide-extension "MemVibe.app" \
            --app-drop-link 425 190 \
            MemVibe.dmg \
            dmg_staging/

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MemVibe-Installer
          path: MemVibe.dmg
          retention-days: 7
