name: Build MemVibe DMG

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build and Package macOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build MemVibe App (Unsigned)
        run: |
          # Builds the app directly to a local build folder, skipping code signing 
          # since GitHub Actions doesn't have your local Apple Developer credentials.
          xcodebuild clean build \
            -project MemVibe.xcodeproj \
            -scheme MemVibe \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Debug - List app bundle contents
        run: |
          APP_PATH="build/Build/Products/Release/MemVibe.app"
          echo "=== Info.plist ==="
          cat "$APP_PATH/Contents/Info.plist" || echo "No Info.plist found"
          echo ""
          echo "=== Resources directory ==="
          ls -la "$APP_PATH/Contents/Resources/" || echo "No Resources dir"
          echo ""
          echo "=== All .icns files ==="
          find "$APP_PATH" -name "*.icns" -type f || echo "No .icns files found"

      - name: Create DMG Installer
        run: |
          APP_PATH="build/Build/Products/Release/MemVibe.app"

          # Try to find the icon: first from Info.plist, then search for any .icns
          ICON_PATH=""
          ICON_FILE=$(defaults read "$APP_PATH/Contents/Info" CFBundleIconFile 2>/dev/null || echo "")
          if [ -n "$ICON_FILE" ]; then
            [[ "$ICON_FILE" != *.icns ]] && ICON_FILE="${ICON_FILE}.icns"
            if [ -f "$APP_PATH/Contents/Resources/$ICON_FILE" ]; then
              ICON_PATH="$APP_PATH/Contents/Resources/$ICON_FILE"
            fi
          fi

          # Fallback: find any .icns file in the app bundle
          if [ -z "$ICON_PATH" ]; then
            ICON_PATH=$(find "$APP_PATH/Contents/Resources" -name "*.icns" -type f | head -1)
          fi

          echo "Using volume icon: ${ICON_PATH:-NONE FOUND}"

          # Build create-dmg command
          ARGS=(
            --volname "MemVibe"
            --window-pos 200 120
            --window-size 600 400
            --icon-size 100
            --icon "MemVibe.app" 175 190
            --hide-extension "MemVibe.app"
            --app-drop-link 425 190
          )

          # Add volume icon if found
          if [ -n "$ICON_PATH" ] && [ -f "$ICON_PATH" ]; then
            ARGS+=(--volicon "$ICON_PATH")
          else
            echo "WARNING: No .icns icon found in app bundle!"
          fi

          create-dmg "${ARGS[@]}" MemVibe.dmg "$APP_PATH"

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MemVibe-Installer
          path: MemVibe.dmg
          retention-days: 7
